version: '3.9'

services:
  mysql-db:
    image: mysql:8.0
    container_name: mysql-db
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: log_analysis_db
    networks:
      - sprintify-net
    healthcheck:
      test: ["CMD", "mysqladmin" ,"ping", "-h", "localhost"]
      timeout: 5s
      retries: 10

  log-analysis-service:
    build: 
      context: ./log-analysis-service
      dockerfile: Dockerfile
    container_name: log-analysis-service
    ports:
      - "8083:8083"
    depends_on:
      mysql-db:
        condition: service_healthy
    networks:
      - sprintify-net
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql-db:3306/log_analysis_db?createDatabaseIfNotExist=true
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=123456

networks:
  sprintify-net:
    driver: bridge