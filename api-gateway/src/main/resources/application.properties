spring.application.name=api-gateway
server.port=8762

# 1. Turn off the auto-locator
spring.cloud.gateway.discovery.locator.enabled=false
spring.cloud.gateway.discovery.locator.lower-case-service-id=true

# 2. Tell the Gateway where Eureka is
eureka.client.serviceUrl.defaultZone=http://localhost:8761/eureka/

# 3. Routes to Identity Service
spring.cloud.gateway.routes[0].id=identity-service-auth
spring.cloud.gateway.routes[0].uri=lb://IDENTITY-SERVICE
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/v1/auth/**

spring.cloud.gateway.routes[1].id=identity-service-users
spring.cloud.gateway.routes[1].uri=lb://IDENTITY-SERVICE
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/v1/users/**