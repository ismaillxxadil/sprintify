spring.application.name=project-service
server.port=8082

#Eureka Client Configuration
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true

# Database Connection
spring.datasource.url=jdbc:postgresql://localhost:5333/project_service_db
spring.datasource.username=user_service
spring.datasource.password=123456

# Hibernate Configuration (Updates schema automatically based on your entities)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true
spring.jpa.open-in-view=false
